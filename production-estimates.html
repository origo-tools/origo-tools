<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimaciones de Producción — Origo Bakery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f5f0eb; color: #2c2c2c; min-height: 100vh;
  }
  .top-bar {
    background: #1a3a2a; color: white; padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-bar h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .top-bar .store-selector { display: flex; align-items: center; gap: 10px; }
  .top-bar select {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; padding: 6px 12px; border-radius: 6px; font-size: 14px; cursor: pointer;
  }
  .top-bar select option { color: #2c2c2c; background: white; }

  .day-tabs { display: flex; background: #22503a; padding: 0 16px; gap: 2px; overflow-x: auto; }
  .day-tab {
    padding: 10px 20px; color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent;
    transition: all 0.2s; white-space: nowrap;
  }
  .day-tab:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.05); }
  .day-tab.active { color: white; border-bottom-color: #e8c547; background: rgba(255,255,255,0.08); }

  .alerts-bar {
    display: flex; gap: 12px; padding: 10px 24px; background: white;
    border-bottom: 1px solid #e0d8d0; align-items: center; flex-wrap: wrap;
  }
  .weather-badge {
    display: flex; align-items: center; gap: 6px;
    background: #eef6ff; padding: 5px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 500; color: #1a5276;
  }
  .event-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
  }
  .event-badge.high { background: #fde8e8; color: #c0392b; }
  .event-badge.medium { background: #fef3e2; color: #b7791f; }
  .event-badge.info { background: #e8f5e9; color: #2e7d32; }
  .alerts-bar .date-label { font-size: 14px; font-weight: 600; color: #555; margin-right: auto; }

  .main-content { padding: 16px 24px 100px; max-width: 1500px; overflow-x: auto; }

  .section-header {
    font-size: 16px; font-weight: 700; padding: 14px 0 6px; color: #1a3a2a;
    display: flex; align-items: center; gap: 8px;
  }

  table.grid { width: auto; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
  table.grid th {
    background: #1a3a2a; color: white; padding: 6px 10px; text-align: center;
    font-weight: 600; font-size: 12px; white-space: nowrap; border: 1px solid #153022;
  }
  table.grid th.shop-header { background: #2d6a4f; }
  table.grid th.orders-header { background: #7f4f24; }
  table.grid th.batch-1 { background: #457b9d; }
  table.grid th.batch-2 { background: #6d6875; }
  table.grid th.batch-3 { background: #9b5de5; }
  table.grid th.sobras-header { background: #8b6914; }

  table.grid td {
    padding: 5px 8px; border: 1px solid #d5cfc7; text-align: center; background: white;
  }
  table.grid td.product-name {
    text-align: left; font-weight: 600; background: #faf8f5;
    white-space: nowrap; min-width: 200px;
  }
  table.grid td.product-name .mult {
    font-weight: 400; font-size: 11px; color: #888; margin-left: 4px;
  }
  table.grid td.total-col { background: #fce4ec; font-weight: 700; }
  table.grid td.sep { background: #f5f0eb; border: none; width: 6px; padding: 0; }
  table.grid td.group-sep {
    background: #f5f0eb; border-left: none; border-right: none; height: 6px; padding: 0;
  }

  table.grid td.sobras-cell { background: #fffcf5; font-size: 12px; min-width: 70px; }
  table.grid td.sobras-cell.ran-out { background: #fef0f0; color: #c0392b; font-weight: 600; }
  table.grid td.sobras-cell.leftover { color: #b7791f; font-weight: 600; }
  table.grid td.sobras-cell.perfect { background: #f0faf0; color: #2e7d32; font-weight: 600; }

  .batch-alert {
    display: inline-block; background: #fde8e8; color: #c0392b;
    font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 8px; margin-left: 2px;
  }
  .batch-alert.b1 { background: #e3eef7; color: #457b9d; }
  .batch-alert.b2 { background: #eee8f0; color: #6d6875; }
  .batch-alert.b3 { background: #f0e8fa; color: #9b5de5; }

  table.grid td.editable { cursor: text; position: relative; }
  table.grid td.editable:hover { background: #fff9e6; }
  table.grid td.editable:focus-within { outline: 2px solid #e8c547; outline-offset: -2px; }
  table.grid td.editable input {
    width: 100%; border: none; background: transparent; text-align: center;
    font-size: 13px; font-weight: 600; font-family: inherit; padding: 0;
  }
  table.grid td.editable input:focus { outline: none; }
  table.grid td.editable.ai input { color: #2d6a4f; }
  table.grid td.editable.manual input { color: #555; }
  table.grid td.editable.edited input { color: #c0392b; }
  table.grid td.order-cell { background: #fdf8f0; }

  .round-badge {
    display: inline-block; font-size: 10px; font-weight: 600; color: #457b9d;
    background: #eef6ff; padding: 1px 5px; border-radius: 6px; margin-left: 3px;
  }
  table.grid td.trays-cell {
    background: #f8f6ff; color: #6d6875; font-size: 12px; font-weight: 500; min-width: 50px;
  }

  .sync-bar {
    position: sticky; bottom: 0; background: white;
    border-top: 2px solid #e0d8d0; padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between; z-index: 50;
  }
  .sync-btn {
    background: #1a3a2a; color: white; border: none; padding: 10px 28px;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: all 0.2s;
  }
  .sync-btn:hover { background: #22503a; transform: translateY(-1px); }
  .sync-btn:active { transform: translateY(0); }
  .sync-btn.synced { background: #2e7d32; }
  .sync-status { font-size: 13px; color: #888; }
  .sync-status strong { color: #2e7d32; }
  .legend { display: flex; gap: 16px; font-size: 12px; color: #888; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-dot.ai { background: #2d6a4f; }
  .legend-dot.edited { background: #c0392b; }

  .sync-preview { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .sync-preview.show { display: flex; }
  .sync-modal {
    background: white; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%;
    max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .sync-modal h3 { font-size: 16px; margin-bottom: 12px; color: #1a3a2a; }
  .sync-modal .round-row {
    display: flex; justify-content: space-between; padding: 6px 0;
    border-bottom: 1px solid #eee; font-size: 13px;
  }
  .sync-modal .round-row .original { color: #888; text-decoration: line-through; }
  .sync-modal .round-row .rounded { color: #2d6a4f; font-weight: 600; }
  .sync-modal .round-row .arrow { color: #aaa; margin: 0 6px; }
  .sync-modal-btns { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
  .sync-modal-btns button {
    padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none;
  }
  .sync-modal-btns .cancel { background: #eee; color: #555; }
  .sync-modal-btns .confirm { background: #1a3a2a; color: white; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Settings gear button in top bar */
  .settings-btn {
    background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer;
    padding: 4px; border-radius: 6px; display: flex; align-items: center; transition: all 0.2s;
  }
  .settings-btn:hover { color: white; background: rgba(255,255,255,0.1); }
  .settings-btn.open { color: #e8c547; }
  .settings-btn svg { transition: transform 0.3s ease; }
  .settings-btn.open svg { transform: rotate(90deg); }

  /* Collapsible settings panel */
  .settings-panel {
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
    border-bottom: 1px solid #e0d8d0;
  }
  .settings-panel.open { max-height: 200px; }
  .settings-panel .settings-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 24px; font-size: 13px;
  }
  .settings-panel .settings-row:first-child { padding-top: 12px; }
  .settings-panel .settings-row:last-child { padding-bottom: 12px; }
  .settings-panel .settings-row label { font-weight: 600; white-space: nowrap; color: #555; min-width: 130px; }
  .settings-panel input.settings-input {
    flex: 1; padding: 5px 10px; border: 1px solid #e0d8d0; border-radius: 6px;
    font-size: 13px; font-family: inherit; max-width: 450px;
  }
  .settings-panel input.settings-input:focus { outline: none; border-color: #1a3a2a; }
  .settings-panel button.settings-save {
    padding: 5px 14px; background: #1a3a2a; color: white; border: none;
    border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .settings-panel button.settings-save:hover { background: #22503a; }
  .settings-panel .status { font-weight: 600; font-size: 12px; }
  .settings-panel .status.ok { color: #2e7d32; }
  .settings-panel .status.err { color: #c0392b; }
  .sobras-loading { color: #888; font-style: italic; font-size: 12px; }
</style>
</head>
<body>

<div class="top-bar">
  <div><h1>origo — estimaciones de producción</h1></div>
  <div class="store-selector">
    <select id="storeSelect" onchange="switchStore(this.value)">
      <option value="santpau">Sant Pau</option>
      <option value="mila">Milà</option>
      <option value="santjoan">Sant Joan</option>
    </select>
    <button class="settings-btn" id="settingsBtn" onclick="toggleSettings()" title="Ajustes">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>
</div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-row">
    <label>API Estimaciones</label>
    <input class="settings-input" type="text" id="forecastApiUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="settings-save" onclick="saveForecastApiConfig()">Conectar</button>
    <span class="status" id="forecastApiStatus"></span>
  </div>
  <div class="settings-row">
    <label>API Sobras</label>
    <input class="settings-input" type="text" id="apiUrlConfig" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="settings-save" onclick="saveApiConfig()">Conectar</button>
    <span class="status" id="apiStatus"></span>
  </div>
  <div class="settings-row">
    <label>Pastry del mes</label>
    <input class="settings-input" type="text" id="pdmInput" placeholder="Nombre en Square (e.g. Tartaleta Pera)" style="max-width:280px;" onkeydown="if(event.key==='Enter')savePdm()">
    <button class="settings-save" onclick="savePdm()">Guardar</button>
    <span class="status" id="pdmStatus"></span>
  </div>
</div>
<div class="day-tabs" id="dayTabs"></div>
<div class="alerts-bar" id="alertsBar"></div>
<div class="main-content" id="mainContent"></div>

<div class="sync-bar">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot ai"></div> Sugerencia IA (shop)</div>
    <div class="legend-item"><div style="width:10px;height:10px;border-radius:50%;background:#b7791f"></div> Pedidos (sem. pasada)</div>
    <div class="legend-item"><div class="legend-dot edited"></div> Editado</div>
    <div class="legend-item"><span class="round-badge">×12</span> Redondeado al sincronizar</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="sync-status" id="syncStatus">Sin sincronizar</div>
    <button class="sync-btn" id="syncBtn" onclick="showSyncPreview()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      Sincronizar con Hoja de Producción
    </button>
  </div>
</div>

<div class="sync-preview" id="syncPreview">
  <div class="sync-modal">
    <h3>Resumen de redondeo antes de sincronizar</h3>
    <p style="font-size:13px;color:#888;margin-bottom:12px;">Cada lote se redondea a bandejas completas (×12, ×6, ×3, ×5):</p>
    <div id="syncPreviewContent"></div>
    <div class="sync-modal-btns">
      <button class="cancel" onclick="closeSyncPreview()">Cancelar</button>
      <button class="confirm" onclick="confirmSync()">Confirmar y sincronizar</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

const STORES = {
  santpau: { name: 'Sant Pau', fcType: 'focaccia', fcNames: ['Mortadella','Panceta & crème fraîche','Chorizo','Olivas','Berenjena'] },
  mila:    { name: 'Milà', fcType: 'focaccia', fcNames: ['Mortadella','Panceta & crème fraîche','Chorizo','Olivas','Berenjena'] },
  santjoan:{ name: 'Sant Joan', fcType: 'bocadillo', fcNames: ['Mortadella','Berenjena','Jamón y queso'] }
};

// ===== PRODUCT DEFINITIONS (updated to match Square / production sheet) =====
const BREAD = [
  { name: 'ORIGO', key: 'origo', roundTo: null },
  { name: 'ORIGO MOLDE', key: 'origoMolde', roundTo: null },
  { spacer: true },
  { name: 'ORIGO INTEGRAL', key: 'origoIntegral', roundTo: null },
  { sep: true },
  { name: 'ESPECIAL', key: 'especial', roundTo: null },
  { name: 'LLAVORS', key: 'llavors', roundTo: null },
  { sep: true },
  { name: 'SÈGOL INTEGRAL', key: 'segolIntegral', roundTo: 3, label: 'x3' },
  { name: 'COPENHAGUE', key: 'copenhague', roundTo: 5, label: 'x5' },
  { name: 'BAGUETTE', key: 'baguette', roundTo: null },
  { name: 'FOCACCIA', key: 'focaccia', roundTo: null },
  { name: 'ESPELTA PETITA', key: 'espeltaPetita', roundTo: null }
];

const PASTRY_GROUPS = [
  [{ name: 'Canela Twist', key: 'canelaTwist', roundTo: 12, label: 'x12' },
   { name: 'Cardamomo twist', key: 'cardamomoTwist', roundTo: 12, label: 'x12' },
   { name: 'Vainilla Roll', key: 'vainillaRoll', roundTo: 12, label: 'x12' },
   { name: 'Brioix clàssic', key: 'brioixClassic', roundTo: 12, label: 'x12' }],
  [{ name: 'Croissant', key: 'croissant', roundTo: 12, label: 'x12' },
   { name: 'Pain au chocolat', key: 'painChocolat', roundTo: 12, label: 'x12' },
   { name: 'Napolitana pernil i formatge', key: 'napolitana', roundTo: 12, label: 'x12' }],
  [{ name: 'Mico', key: 'mico', roundTo: 6, label: 'x6' },
   { name: 'Niu de temporada', key: 'niuTemporada', roundTo: 12, label: 'x12' }],
  [{ name: "Croissant d'ametlla", key: 'croissantAmetlla', roundTo: 12, label: 'x12' }],
  [{ name: 'Cookie chocolate', key: 'cookieChocolate', roundTo: null, label: 'uds' },
   { name: 'Pastry del mes', key: 'pastryMes', roundTo: null, label: 'uds' }],
  [{ name: 'Pastís llimona i ametlla', key: 'pastisLlimona', roundTo: null }]
];

function roundToNearest(value, multiple) {
  if (!multiple || !value) return value;
  return Math.round(value / multiple) * multiple;
}

// Round total (shop+orders) to nearest multiple, but:
// 1. Never round a non-zero total to 0
// 2. Always guarantee orders are covered (round up if needed)
function roundWithOrderGuarantee(total, orderVal, multiple) {
  if (!multiple) return total;
  if (total === 0) return orderVal > 0 ? Math.ceil(orderVal / multiple) * multiple : 0;
  const rounded = Math.round(total / multiple) * multiple;
  // Never round non-zero to 0, and always cover orders
  if (rounded === 0 || rounded < orderVal) return Math.ceil(total / multiple) * multiple;
  return rounded;
}

// ===== PRODUCT NAME → KEY MAPPING (for sobras data from API) =====
const PRODUCT_NAME_TO_KEY = {
  // Bread
  'ORIGO': 'origo', 'ORIGO MOLDE': 'origoMolde', 'ORIGO INTEGRAL': 'origoIntegral',
  'ESPECIAL': 'especial', 'LLAVORS': 'llavors', 'SÈGOL INTEGRAL': 'segolIntegral',
  'COPENHAGUE': 'copenhague', 'BAGUETTE': 'baguette', 'FOCACCIA': 'focaccia',
  'ESPELTA PETITA': 'espeltaPetita',
  // Pastry
  'Canela Twist': 'canelaTwist', 'Cardamomo twist': 'cardamomoTwist',
  'Vainilla Roll': 'vainillaRoll', 'Brioix clàssic': 'brioixClassic',
  'Croissant': 'croissant', 'Pain au chocolat': 'painChocolat',
  'Napolitana pernil i formatge': 'napolitana',
  'Mico': 'mico', 'Niu de temporada': 'niuTemporada',
  "Croissant d'ametlla": 'croissantAmetlla',
  'Cookie chocolate': 'cookieChocolate', 'Pastry del mes': 'pastryMes',
  'Pastís llimona i ametlla': 'pastisLlimona'
};

const BREAD_KEYS = new Set(['origo','origoMolde','origoIntegral','especial','llavors','segolIntegral','copenhague','baguette','focaccia','espeltaPetita']);
const PASTRY_KEYS = new Set(['canelaTwist','cardamomoTwist','vainillaRoll','brioixClassic','croissant','painChocolat','napolitana','mico','niuTemporada','croissantAmetlla','cookieChocolate','pastryMes','pastisLlimona']);

// ===== FORECASTING API INTEGRATION =====
let forecastCache = {};  // cache: { 'store-date': apiResponse }
let weatherCache = {};   // cache: { 'date': weatherData }
let forecastLoading = false;

// Store name mapping: internal key → API store name
const STORE_API_NAMES = { santpau: 'Sant Pau', mila: 'Milà', santjoan: 'Sant Joan' };

// Product cell → key mapping (from API response to internal key)
const CELL_TO_KEY = {
  'D8': 'origo', 'D9': 'origoMolde', 'D10': 'origoIntegral',
  'D12': 'especial', 'D13': 'llavors', 'D16': 'segolIntegral',
  'D17': 'copenhague', 'D18': 'baguette', 'D19': 'focaccia', 'D20': 'espeltaPetita',
  'D29': 'canelaTwist', 'D30': 'cardamomoTwist', 'D31': 'vainillaRoll',
  'D32': 'brioixClassic', 'D34': 'croissant', 'D35': 'painChocolat',
  'D36': 'napolitana', 'D38': 'mico', 'D39': 'niuTemporada',
  'D41': 'croissantAmetlla', 'D43': 'cookieChocolate', 'D44': 'pastryMes',
  'D46': 'pastisLlimona'
};

const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbz1z5Yz-qyJSPfxINXMFnqBJwR-nNQ3NlTrACj04mwOgs_Xk0U_tdmjsLYI7eM7rV0/exec';
function getForecastApiUrl() {
  try { return localStorage.getItem('origo_forecast_api_url') || DEFAULT_API_URL; } catch(e) { return DEFAULT_API_URL; }
}
function setForecastApiUrl(url) {
  try { localStorage.setItem('origo_forecast_api_url', url); } catch(e) {}
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const btn = document.getElementById('settingsBtn');
  panel.classList.toggle('open');
  btn.classList.toggle('open');
}

function saveForecastApiConfig() {
  const input = document.getElementById('forecastApiUrl');
  const url = input.value.trim();
  if (!url) return;
  setForecastApiUrl(url);
  testForecastApiConnection(url);
  forecastCache = {};
  loadEstimatesForCurrentDay();
}

async function testForecastApiConnection(url) {
  const status = document.getElementById('forecastApiStatus');
  status.textContent = 'Conectando...';
  status.className = 'status';
  try {
    const resp = await fetch(url + '?action=stores');
    const data = await resp.json();
    if (data.stores && data.stores.length > 0) {
      status.textContent = '✓ Conectado (' + data.stores.length + ' tiendas)';
      status.className = 'status ok';
    } else {
      status.textContent = '✗ Respuesta inesperada';
      status.className = 'status err';
    }
  } catch(e) {
    status.textContent = '✗ No se pudo conectar';
    status.className = 'status err';
  }
}

// ── Pastry del mes ──────────────────────────────────────────

function getPastryDelMes() {
  return localStorage.getItem('origo-pastry-del-mes') || '';
}

function savePdm() {
  const input = document.getElementById('pdmInput');
  const name = input.value.trim();
  if (!name) return;

// ===== DATE LOGIC =====
// Generated dates cache: populated on init by calling ?action=generatedDates
// Contains the dates for which the trigger has successfully generated estimates
let generatedDatesSet = new Set(); // Set of 'YYYY-MM-DD' strings

// Get NEXT WEEK's date for a given day
function getNextWeekDate(dayName) {
  const dayIdx = DAYS.indexOf(dayName);
  const today = new Date();
  const todayDay = today.getDay();
  const daysUntilNextMon = todayDay === 0 ? 1 : (8 - todayDay);
  const nextMon = new Date(today);
  nextMon.setDate(today.getDate() + daysUntilNextMon);
  const target = new Date(nextMon);
  target.setDate(nextMon.getDate() + dayIdx);
  return target;
}

// Get THIS WEEK's date for a given day
function getThisWeekDate(dayName) {
  const dayIdx = DAYS.indexOf(dayName);
  const today = new Date();
  const todayDay = today.getDay();
  // Find this week's Monday
  const daysSinceMonday = todayDay === 0 ? 6 : (todayDay - 1);
  const thisMon = new Date(today);
  thisMon.setDate(today.getDate() - daysSinceMonday);
  const target = new Date(thisMon);
  target.setDate(thisMon.getDate() + dayIdx);
  return target;
}

// Get the target date for a given day — next week if estimates have been generated, else this week
function getTargetDate(dayName) {
  const nextWeek = getNextWeekDate(dayName);
  const nextWeekStr = formatDateStr(nextWeek);
  if (generatedDatesSet.has(nextWeekStr)) {
    return nextWeek;
  }
  return getThisWeekDate(dayName);
}

// Check if a day is showing next week's date (i.e. estimates have been generated)
function isDayGenerated(dayName) {
  const nextWeek = getNextWeekDate(dayName);
  return generatedDatesSet.has(formatDateStr(nextWeek));
}

function formatDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

// Fetch which dates have been generated by the trigger
async function loadGeneratedDates() {
  const apiUrl = getForecastApiUrl();
  if (!apiUrl) return;
  try {
    const resp = await fetch(apiUrl + '?action=generatedDates');
    const data = await resp.json();
    if (data.dates) {
      generatedDatesSet = new Set(data.dates.map(d => d.date));
    }
  } catch(e) {
    console.warn('Failed to load generated dates:', e);
  }
}

// Fetch estimates from the forecasting API
async function loadEstimatesForCurrentDay() {
  const apiUrl = getForecastApiUrl();
  if (!apiUrl) return;

  const storeName = STORE_API_NAMES[currentStore];
  const targetDate = getTargetDate(currentDay);
  const dateStr = formatDateStr(targetDate);
  const cacheKey = `${currentStore}-${dateStr}`;

  if (forecastCache[cacheKey]) {
    renderAll();
    return;
  }

  forecastLoading = true;
  renderMain();

  try {
    const pdm = getPastryDelMes();
    const pdmParam = pdm ? `&pastryDelMes=${encodeURIComponent(pdm)}` : '';
    const url = `${apiUrl}?action=estimates&store=${encodeURIComponent(storeName)}&date=${dateStr}${pdmParam}`;
    const resp = await fetch(url);
    const data = await resp.json();

    if (data.error) {
      console.warn('Forecast API error:', data.error);
    } else {
      forecastCache[cacheKey] = data;
      // Cache weather data too
      if (data.weather) {
        weatherCache[dateStr] = data.weather;
      }
    }
  } catch(e) {
    console.warn('Failed to fetch estimates:', e);
  }

  forecastLoading = false;
  renderAll();
}

// Get cached estimates for current day, or return defaults
function getShopSuggestions() {
  const targetDate = getTargetDate(currentDay);
  const dateStr = formatDateStr(targetDate);
  const cacheKey = `${currentStore}-${dateStr}`;
  const cached = forecastCache[cacheKey];

  const result = { bread: {}, pastry: {} };

  // Default all to 0
  BREAD.forEach(item => { if (item.key) result.bread[item.key] = 0; });
  PASTRY_GROUPS.flat().forEach(p => { if (p.key) result.pastry[p.key] = { b1: 0, b2: 0, b3: 0 }; });

  if (!cached || !cached.estimates) return result;

  for (const est of cached.estimates) {
    const key = CELL_TO_KEY[est.cell];
    if (!key) continue;

    if (est.type === 'bread') {
      result.bread[key] = est.estimate;
    } else if (est.type === 'pastry') {
      // Distribute total across batches using hourly sales data from BigQuery
      // API provides batchSplit: { b1Pct, b2Pct, b3Pct } based on real hourly patterns
      // Fallback to even 33/33/34 if no data available
      const total = est.estimate;
      const lata = (est.lataSize != null) ? est.lataSize : 12;
      const split = est.batchSplit || { b1Pct: 0.33, b2Pct: 0.33, b3Pct: 0.34 };

      // Special baking rules per product:
      // - Pastís llimona i ametlla: only baked once in B1
      // - Cookie chocolate: only B1 (08-13h) and B3 (13h-close), no B2
      if (est.product === 'Pastís llimona i ametlla') {
        result.pastry[key] = { b1: total, b2: 0, b3: 0 };
      } else if (est.product === 'Cookie chocolate') {
        const b1 = Math.ceil(total * split.b1Pct);
        const b3 = Math.max(0, total - b1);
        result.pastry[key] = { b1, b2: 0, b3 };
      } else if (lata > 0) {
        // Round B1 and B3 to nearest lata (not ceil), B2 gets the remainder
        // This prevents B1+B2 from consuming everything on small totals (e.g. Mico)
        const b1 = Math.round((total * split.b1Pct) / lata) * lata;
        const b3 = Math.round((total * split.b3Pct) / lata) * lata;
        const b2 = Math.max(0, total - b1 - b3);
        result.pastry[key] = { b1, b2: Math.round(b2 / lata) * lata, b3 };
      } else {
        // Per-unit items (uds): no lata rounding needed
        const b1 = Math.round(total * split.b1Pct);
        const b3 = Math.max(0, total - b1 - Math.round(total * split.b2Pct));
        const b2 = total - b1 - b3;
        result.pastry[key] = { b1, b2, b3 };
      }
    }
  }

  return result;
}

function getLastWeekOrders() {
  // Orders from last week — for now return empty, will integrate later
  const result = { bread: {}, pastry: {} };
  BREAD.forEach(item => { if (item.key) result.bread[item.key] = 0; });
  PASTRY_GROUPS.flat().forEach(p => { if (p.key) result.pastry[p.key] = { b1: 0, b2: 0, b3: 0 }; });
  return result;
}

// Get weather for current day from cache or default
function getWeatherForDay(dayName) {
  const targetDate = getTargetDate(dayName);
  const dateStr = formatDateStr(targetDate);
  const cached = weatherCache[dateStr];
  if (cached) {
    const icon = weatherCodeToIcon(cached.weathercode);
    return {
      icon,
      temp: `${Math.round(cached.temp_max || 0)}°C`,
      desc: cached.description || 'N/A',
      rain: `${Math.round(cached.precipitation_mm || 0)}mm`
    };
  }
  return { icon: '❓', temp: '—', desc: 'Cargando...', rain: '—' };
}

function weatherCodeToIcon(code) {
  if (code === undefined || code === null) return '❓';
  if (code <= 1) return '☀️';
  if (code <= 3) return '⛅';
  if (code <= 48) return '🌫️';
  if (code <= 55) return '🌦️';
  if (code <= 65) return '🌧️';
  if (code <= 75) return '🌨️';
  if (code <= 82) return '🌧️';
  return '⛈️';
}

// Get factors info from cached estimates
function getEstimateFactors() {
  const targetDate = getTargetDate(currentDay);
  const dateStr = formatDateStr(targetDate);
  const cacheKey = `${currentStore}-${dateStr}`;
  const cached = forecastCache[cacheKey];
  if (!cached) return null;
  return {
    isHoliday: cached.isHoliday,
    seasonalIndex: cached.seasonalIndex,
    weather: cached.weather,
  };
}

async function fetchSobrasForCurrentDay() {

    for (const [name, pData] of Object.entries(products)) {

      // v2 format: { sobras, b1SoldOut, b2SoldOut, b3SoldOut }
      const sobrasObj = {

        b1SoldOut: pData.b1SoldOut || null,
        b2SoldOut: pData.b2SoldOut || null,
        b3SoldOut: pData.b3SoldOut || null
      };

      if (key && BREAD_KEYS.has(key)) {
        result.bread[key] = sobrasObj;
      } else if (key && PASTRY_KEYS.has(key)) {
        result.pastry[key] = sobrasObj;
      } else {
        result.focaccia[name] = sobrasObj;

  renderMain();

// ============ STATE ============
let currentStore = 'santpau';
let currentDay = 'Miércoles';
let editedCells = {};

// ============ INPUT PERSISTENCE (localStorage) ============
// Shop values: saved per store + specific date (reset when new AI estimates arrive)
// Order values: saved per store + day of week (carry over week to week)

function getShopStorageKey() {
  const targetDate = getTargetDate(currentDay);
  const dateStr = formatDateStr(targetDate);
  return `origo-shop-${currentStore}-${dateStr}`;
}

function getOrderStorageKey() {
  // Day-of-week key (no date) so orders persist across weeks
  return `origo-orders-${currentStore}-${currentDay}`;
}

function saveInputState() {
  const shopData = {};
  const orderData = {};

  document.querySelectorAll('.editable input').forEach(input => {
    const key = input.dataset.key;
    const val = input.value;
    if (!key || val === '') return;

    // Order inputs contain '-order' (bread) or end in 'o' for pastry batches (b1o, b2o, b3o)
    const isOrder = key.includes('-order') || /-(b[123]o)$/.test(key);
    if (isOrder) {
      orderData[key] = val;
    } else {
      shopData[key] = val;
    }
  });

  localStorage.setItem(getShopStorageKey(), JSON.stringify({ inputs: shopData, editedCells }));
  localStorage.setItem(getOrderStorageKey(), JSON.stringify({ inputs: orderData }));
}

function restoreInputState() {
  // 1. Restore shop values (per date — only if they exist for this week's estimate)
  try {
    const shopSaved = localStorage.getItem(getShopStorageKey());
    if (shopSaved) {
      const { inputs, editedCells: savedEdited } = JSON.parse(shopSaved);
      if (inputs) {
        for (const [key, val] of Object.entries(inputs)) {
          const input = document.querySelector(`input[data-key="${key}"]`);
          if (input) {
            input.value = val;
            input.closest('td').className = 'editable edited';
          }
        }
      }
      if (savedEdited) Object.assign(editedCells, savedEdited);
    }
  } catch(e) { console.warn('Failed to restore shop inputs:', e); }

  // 2. Restore order values (per day of week — persist across weeks)
  try {
    const orderSaved = localStorage.getItem(getOrderStorageKey());
    if (orderSaved) {
      const { inputs } = JSON.parse(orderSaved);
      if (inputs) {
        for (const [key, val] of Object.entries(inputs)) {
          const input = document.querySelector(`input[data-key="${key}"]`);
          if (input) {
            input.value = val;
            input.closest('td').className = 'editable edited';
          }
        }
      }
    }
  } catch(e) { console.warn('Failed to restore order inputs:', e); }
}

// ============ HELPERS ============
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function eCell(key, value, cls) {
  const isEdited = editedCells[key];
  const cellCls = isEdited ? 'edited' : cls;
  const displayVal = (value === 0 || value === '0') ? '0' : (value || '');
  return `<td class="editable ${cellCls}"><input type="text" data-key="${key}" value="${displayVal}" inputmode="numeric"></td>`;
}

// Format a sold-out timestamp to just HH:MM
// Input can be ISO string ("1899-12-30T22:56:44.000Z"), "HH:MM", or "HH:MM:SS"
function formatSoldOutTime(raw) {
  if (!raw) return '';
  const str = String(raw);
  // ISO timestamp — extract time part
  if (str.includes('T')) {
    try {
      const d = new Date(str);
      if (!isNaN(d)) return d.getUTCHours().toString().padStart(2,'0') + ':' + d.getUTCMinutes().toString().padStart(2,'0');
    } catch(e) {}
  }
  // Already "HH:MM" or "HH:MM:SS" — keep just HH:MM
  const m = str.match(/(\d{1,2}:\d{2})/);
  return m ? m[1] : str;
}

// Bread sobras cell — simple: sobras count or sold-out indicator (no batches for bread)
function sobrasCell(data) {
  if (!data) return `<td class="sobras-cell">—</td>`;
  const hasSobras = data.sobras !== null && data.sobras !== undefined && data.sobras !== '';

  // For bread, any sold-out field just means it sold out (no batch distinction)
  const soldOut = data.b1SoldOut || data.b2SoldOut || data.b3SoldOut;

  if (soldOut && !hasSobras) {
    return `<td class="sobras-cell ran-out">⚡ Agotado ${formatSoldOutTime(soldOut)}</td>`;
  }
  if (hasSobras) {
    if (data.sobras === 0 || data.sobras === '0') return `<td class="sobras-cell perfect">✓ 0</td>`;
    return `<td class="sobras-cell leftover">${data.sobras}</td>`;
  }
  return `<td class="sobras-cell">—</td>`;
}

// Pastry sobras — show per-batch sold-out badges AND sobras count
function pastryBatchSobras(data, batchNum) {
  if (!data) return '';
  const key = `b${batchNum}SoldOut`;
  const time = data[key];
  if (time) {
    const cls = batchNum === 1 ? 'b1' : batchNum === 2 ? 'b2' : 'b3';
    return `<span class="batch-alert ${cls}">⚡ ${formatSoldOutTime(time)}</span>`;
  }
  return '';
}

function pastryTotalSobras(data) {
  if (!data) return `<td class="sobras-cell">—</td>`;

  let html = '';
  const hasSoldOuts = data.b1SoldOut || data.b2SoldOut || data.b3SoldOut;
  const hasSobras = data.sobras !== null && data.sobras !== undefined && data.sobras !== '';

  if (hasSobras) {
    if (data.sobras === 0 || data.sobras === '0') {
      html += `<span style="color:#2e7d32;font-weight:600;">✓ 0</span>`;
    } else {
      html += `<span style="color:#b7791f;font-weight:600;">${data.sobras} sobras</span>`;
    }
  }

  if (hasSoldOuts && hasSobras) html += '<br>';

  if (hasSoldOuts) {
    if (data.b1SoldOut) html += `<span class="batch-alert b1">1er ⚡${formatSoldOutTime(data.b1SoldOut)}</span> `;
    if (data.b2SoldOut) html += `<span class="batch-alert b2">2do ⚡${formatSoldOutTime(data.b2SoldOut)}</span> `;
    if (data.b3SoldOut) html += `<span class="batch-alert b3">3er ⚡${formatSoldOutTime(data.b3SoldOut)}</span> `;
  }

  if (!hasSobras && !hasSoldOuts) return `<td class="sobras-cell">—</td>`;

  const cls = (!hasSobras && hasSoldOuts) ? 'ran-out' : (data.sobras === 0 ? 'perfect' : 'leftover');
  return `<td class="sobras-cell ${cls}">${html}</td>`;
}

function productNameCell(name, label) {
  const multHtml = label ? `<span class="mult">${label}</span>` : '';
  return `<td class="product-name">${name}${multHtml}</td>`;
}

    <th rowspan="2">Total</th>
  </tr>`;
  html += `<tr>
    <th class="batch-1">Shop</th><th class="batch-1">Ped.</th>
    <th class="batch-2">Shop</th><th class="batch-2">Ped.</th>
    <th class="batch-3">Shop</th><th class="batch-3">Ped.</th>
  </tr>`;

  PASTRY_GROUPS.forEach((group, gi) => {
    const filteredGroup = group.filter(p => !p.stJoanOnly || currentStore === 'santjoan');
    if (filteredGroup.length === 0) return;
    if (gi > 0) html += `<tr><td colspan="14" class="group-sep"></td></tr>`;
    filteredGroup.forEach(p => {
      const s = shop.pastry[p.key] || { b1:0, b2:0, b3:0 };
      const o = orders.pastry[p.key] || { b1:0, b2:0, b3:0 };
      const sd = sobras.pastry[p.key];
      const totalShop = (s.b1||0) + (s.b2||0) + (s.b3||0);
      const totalAll = totalShop + (o.b1||0) + (o.b2||0) + (o.b3||0);

      // Per-batch sold-out badges next to each batch column
      const b1Alert = pastryBatchSobras(sd, 1);
      const b2Alert = pastryBatchSobras(sd, 2);
      const b3Alert = pastryBatchSobras(sd, 3);

      html += `<tr>
        ${productNameCell(p.name, p.label)}
        ${pastryTotalSobras(sd)}
        <td class="sep"></td>
        ${eCell(`pastry-${p.key}-b1s`, s.b1, 'ai')}
        ${eCell(`pastry-${p.key}-b1o`, o.b1, 'manual order-cell')}
        <td class="sep"></td>
        ${eCell(`pastry-${p.key}-b2s`, s.b2, 'ai')}
        ${eCell(`pastry-${p.key}-b2o`, o.b2, 'manual order-cell')}
        <td class="sep"></td>
        ${eCell(`pastry-${p.key}-b3s`, s.b3, 'ai')}
        ${eCell(`pastry-${p.key}-b3o`, o.b3, 'manual order-cell')}
        <td class="sep"></td>
        <td style="color:#2d6a4f;font-weight:600">${totalShop || ''}</td>
        <td class="total-col">${totalAll || ''}</td>
      </tr>`;
    });
  });
  html += `</table>`;

  // ===== FOCACCIA / BOCADILLO =====
  const isBocadillo = store.fcType === 'bocadillo';
  const fcLabel = isBocadillo ? 'Bocadillos' : 'Focaccias';
  const fcIcon = isBocadillo ? '🥖' : '🫓';
  html += `<div class="section-header">${fcIcon} ${fcLabel}</div>`;
  html += `<table class="grid"><tr>
    <th style="min-width:200px">Producto</th>
    <th class="shop-header">Shop</th>
    ${isBocadillo ? '' : '<th class="orders-header">Pedidos</th>'}
    <th class="sep" style="background:#f5f0eb;border:none"></th>
    <th class="sobras-header">Sem. pasada</th>
  </tr>`;
  store.fcNames.forEach((name, idx) => {
    const fcSobras = sobras.focaccia[name];
    html += `<tr>
      <td class="product-name">${name}</td>
      ${eCell(`fc-${idx}-shop`, 4, 'ai')}
      ${isBocadillo ? '' : eCell(`fc-${idx}-order`, 0, 'manual order-cell')}
      <td class="sep"></td>
      ${sobrasCell(fcSobras)}
    </tr>`;
  });
  html += `</table>`;

  // ===== COMMENTS =====
  const sobrasComments = sobras.comments || '';
  html += `<div class="section-header">💬 Comentarios sobras semana pasada</div>`;
  if (sobrasLoading) {
    html += `<div class="sobras-loading" style="padding:12px;">Cargando datos de sobras...</div>`;
  } else if (sobrasComments) {
    html += `<div style="background:white;border:1px solid #d5cfc7;border-radius:8px;padding:12px;font-size:13px;color:#555;max-width:600px;">
      ${escapeHtml(sobrasComments)}
    </div>`;
  } else {
    html += `<div style="background:white;border:1px solid #d5cfc7;border-radius:8px;padding:12px;font-size:13px;color:#999;max-width:600px;">
      Sin comentarios de la semana pasada
    </div>`;
  }

  document.getElementById('mainContent').innerHTML = html;

  document.querySelectorAll('.editable input').forEach(input => {
    // Strip non-numeric on input (allow digits only)
    input.addEventListener('input', function() {
      this.value = this.value.replace(/[^\d]/g, '');
    });
    // Validate, mark edited, and save on change (blur)
    input.addEventListener('change', function() {
      this.value = this.value.replace(/[^\d]/g, '');
      const v = parseInt(this.value) || 0;
      this.value = Math.max(0, Math.min(9999, v)) || '';
      editedCells[this.dataset.key] = true;
      this.closest('td').className = 'editable edited';
      saveInputState();
    });
  });

  // Restore any previously saved manual adjustments
  restoreInputState();
}

// ===== SYNC WITH ROUNDING PREVIEW =====
function collectRoundingChanges() {
  const changes = [];

  // Bread: round (shop + orders) total, difference goes to shop
  BREAD.forEach(item => {
    if (!item.roundTo) return;
    const shopInput = document.querySelector(`input[data-key="bread-${item.key}-shop"]`);
    const orderInput = document.querySelector(`input[data-key="bread-${item.key}-order"]`);
    if (!shopInput) return;
    const shopVal = parseInt(shopInput.value) || 0;
    const orderVal = orderInput ? (parseInt(orderInput.value) || 0) : 0;
    const total = shopVal + orderVal;
    const rounded = roundToNearest(total, item.roundTo);
    if (total !== rounded && total > 0) {
      const newShop = rounded - orderVal;
      changes.push({ product: item.name, field: 'Shop', original: shopVal, rounded: newShop, total, roundedTotal: rounded, mult: item.label });
    }
  });

  // Pastry: per batch, round (shop + orders) total, guarantee orders covered
  const batchNames = { b1: '1er lote', b2: '2do lote', b3: '3er lote' };
  PASTRY_GROUPS.flat().forEach(p => {
    if (!p.roundTo) return;
    ['b1','b2','b3'].forEach(b => {
      const shopInput = document.querySelector(`input[data-key="pastry-${p.key}-${b}s"]`);
      const orderInput = document.querySelector(`input[data-key="pastry-${p.key}-${b}o"]`);
      if (!shopInput) return;
      const shopVal = parseInt(shopInput.value) || 0;
      const orderVal = orderInput ? (parseInt(orderInput.value) || 0) : 0;
      const total = shopVal + orderVal;
      const rounded = roundWithOrderGuarantee(total, orderVal, p.roundTo);
      if (total !== rounded && (total > 0 || orderVal > 0)) {
        const newShop = Math.max(0, rounded - orderVal);
        changes.push({ product: p.name, field: batchNames[b], original: shopVal, rounded: newShop, total, roundedTotal: rounded, mult: p.label });
      }
    });
  });

  return changes;
}

function showSyncPreview() {
  const changes = collectRoundingChanges();
  const content = document.getElementById('syncPreviewContent');

  if (changes.length === 0) {
    content.innerHTML = `<p style="color:#2e7d32;font-weight:500;">✓ Todos los valores ya son múltiplos correctos. No se necesita redondeo.</p>`;
  } else {
    let html = '';
    changes.forEach(c => {
      html += `<div class="round-row">
        <span>${c.product} <span style="color:#888;font-size:11px">${c.field}</span></span>
        <span>
          <span style="color:#888;font-size:11px">total ${c.total}</span>
          <span class="arrow">→</span>
          <span style="color:#888;font-size:11px">${c.roundedTotal}</span>
          <span style="margin:0 4px">·</span>
          <span style="font-size:11px">shop</span>
          <span class="original">${c.original}</span>
          <span class="arrow">→</span>
          <span class="rounded">${c.rounded}</span>
          <span class="round-badge">${c.mult}</span>
        </span>
      </div>`;
    });
    content.innerHTML = html;
  }

  document.getElementById('syncPreview').classList.add('show');
}

function closeSyncPreview() {
  document.getElementById('syncPreview').classList.remove('show');
}

// KEY_TO_CELL: reverse mapping from internal key → spreadsheet cell
const KEY_TO_CELL = {};
for (const [cell, key] of Object.entries(CELL_TO_KEY)) { KEY_TO_CELL[key] = cell; }

async function confirmSync() {
  closeSyncPreview();

  const apiUrl = getForecastApiUrl();
  if (!apiUrl) {
    alert('Conecta primero la API de estimaciones arriba.');
    return;
  }

  // 1. Apply rounding to bread (round shop+orders total, add extra to shop)
  BREAD.forEach(item => {
    if (!item.roundTo) return;
    const shopInput = document.querySelector(`input[data-key="bread-${item.key}-shop"]`);
    const orderInput = document.querySelector(`input[data-key="bread-${item.key}-order"]`);
    if (!shopInput) return;
    const shopVal = parseInt(shopInput.value) || 0;
    const orderVal = orderInput ? (parseInt(orderInput.value) || 0) : 0;
    const total = shopVal + orderVal;
    const rounded = roundToNearest(total, item.roundTo);
    shopInput.value = rounded - orderVal;  // add rounding difference to shop
  });

  // 2. Apply rounding to pastry (per batch: round shop+orders, guarantee orders covered)
  PASTRY_GROUPS.flat().forEach(p => {
    if (!p.roundTo) return;
    ['b1','b2','b3'].forEach(b => {
      const shopInput = document.querySelector(`input[data-key="pastry-${p.key}-${b}s"]`);
      const orderInput = document.querySelector(`input[data-key="pastry-${p.key}-${b}o"]`);
      if (!shopInput) return;
      const shopVal = parseInt(shopInput.value) || 0;
      const orderVal = orderInput ? (parseInt(orderInput.value) || 0) : 0;
      const total = shopVal + orderVal;
      const rounded = roundWithOrderGuarantee(total, orderVal, p.roundTo);
      shopInput.value = Math.max(0, rounded - orderVal);  // shop = rounded total minus orders
    });
  });

  // 3. Collect all values to sync (cell → value)
  // Column mapping verified from actual production sheets:
  //   Bread:  Shop → col G, Orders → col J  (rows 8-20)
  //   Pastry: B1 Shop → G, B1 Orders → H,
  //           B2 Shop → J, B2 Orders → K,
  //           B3 Shop → M, B3 Orders → N  (rows 29-39+)
  const estimates = [];

  // Helper: extract row number from D-column cell ref (e.g. 'D8' → '8')
  function cellRow(dCell) { return dCell.replace('D', ''); }

  // Bread: shop → column G, orders → column J
  BREAD.forEach(item => {
    if (!item.key) return;
    const dCell = KEY_TO_CELL[item.key];
    if (!dCell) return;
    const row = cellRow(dCell);

    const shopInput = document.querySelector(`input[data-key="bread-${item.key}-shop"]`);
    const orderInput = document.querySelector(`input[data-key="bread-${item.key}-order"]`);
    const shopVal = shopInput ? (parseInt(shopInput.value) || 0) : 0;
    const orderVal = orderInput ? (parseInt(orderInput.value) || 0) : 0;

    estimates.push({ cell: 'G' + row, value: shopVal });
    estimates.push({ cell: 'J' + row, value: orderVal });
  });

  // Pastry: each batch has shop + orders in specific columns
  // B1: G (shop), H (orders) | B2: J (shop), K (orders) | B3: M (shop), N (orders)
  const PASTRY_COL_MAP = {
    b1s: 'G', b1o: 'H',
    b2s: 'J', b2o: 'K',
    b3s: 'M', b3o: 'N',
  };

  PASTRY_GROUPS.flat().forEach(p => {
    if (!p.key) return;
    const dCell = KEY_TO_CELL[p.key];
    if (!dCell) return;
    const row = cellRow(dCell);

    for (const [suffix, col] of Object.entries(PASTRY_COL_MAP)) {
      const input = document.querySelector(`input[data-key="pastry-${p.key}-${suffix}"]`);
      const val = input ? (parseInt(input.value) || 0) : 0;
      estimates.push({ cell: col + row, value: val });
    }
  });

  // Focaccia / Bocadillos: shop + orders → specific rows per store
  // Milà & Sant Pau: Focaccia rows 48-52 (5 items), shop → G, orders → J
  // Sant Joan: Bocadillo rows 50-52 (3 items), shop → G only
  const FC_ROWS = currentStore === 'santjoan' ? [50, 51, 52] : [48, 49, 50, 51, 52];
  const isBocadillo = STORES[currentStore].fcType === 'bocadillo';
  STORES[currentStore].fcNames.forEach((name, idx) => {
    if (idx >= FC_ROWS.length) return;
    const shopInput = document.querySelector(`input[data-key="fc-${idx}-shop"]`);
    const shopVal = shopInput ? (parseInt(shopInput.value) || 0) : 0;
    estimates.push({ cell: 'G' + FC_ROWS[idx], value: shopVal });
    if (!isBocadillo) {
      const orderInput = document.querySelector(`input[data-key="fc-${idx}-order"]`);
      const orderVal = orderInput ? (parseInt(orderInput.value) || 0) : 0;
      estimates.push({ cell: 'J' + FC_ROWS[idx], value: orderVal });
    }
  });

  // 4. Show syncing state
  const btn = document.getElementById('syncBtn');
  const status = document.getElementById('syncStatus');
  btn.disabled = true;
  btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Sincronizando...`;

  // 5. POST to Apps Script sync endpoint
  try {
    const storeName = STORE_API_NAMES[currentStore];
    const resp = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // Apps Script needs text/plain for CORS
      body: JSON.stringify({
        action: 'sync',
        store: storeName,
        dayOfWeek: currentDay,
        estimates
      })
    });
    const data = await resp.json();

    if (data.success) {
      btn.classList.add('synced');
      btn.innerHTML = `✓ Sincronizado — ${currentDay} (${data.updatedCells} celdas)`;
      status.innerHTML = `<strong>Última sync:</strong> ${new Date().toLocaleTimeString('es-ES')} — ${storeName} · ${currentDay}`;

      // Also record Rafa's approved values in BigQuery (fire-and-forget)
      try {
        fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: 'recordApproval',
            store: storeName,
            dayOfWeek: currentDay,
            estimates
          })
        }).catch(() => {}); // Non-blocking, ok if it fails
      } catch(_) {}

      setTimeout(() => {
        btn.disabled = false;
        btn.classList.remove('synced');
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Sincronizar con Hoja de Producción`;
      }, 3000);
    } else {
      throw new Error(data.error || 'Error desconocido');
    }
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Sincronizar con Hoja de Producción`;
    status.innerHTML = `<span style="color:#c0392b;">✗ Error: ${e.message}</span>`;
    console.error('Sync failed:', e);
  }
}

function switchDay(day) { currentDay = day; editedCells = {}; renderAll(); loadEstimatesForCurrentDay(); fetchSobrasForCurrentDay(); }
function switchStore(store) { currentStore = store; editedCells = {}; renderAll(); loadEstimatesForCurrentDay(); fetchSobrasForCurrentDay(); }
function renderAll() { renderDayTabs(); renderAlertsBar(); renderMain(); }

(async function() {
  // Load API configs
  const savedForecastUrl = getForecastApiUrl();
  if (savedForecastUrl) {
    document.getElementById('forecastApiUrl').value = savedForecastUrl;
    testForecastApiConnection(savedForecastUrl);
  }

  const savedUrl = getApiUrlProd();
  if (savedUrl) {
    document.getElementById('apiUrlConfig').value = savedUrl;
    testApiConnection(savedUrl);
  }

  loadPdmSetting();

  // Fetch which dates have been generated by the trigger
  // This determines whether each day tab shows this week or next week
  await loadGeneratedDates();

  // Default to the most recently generated day, or Lunes
  // Find the latest generated day for next week
  const todayDow = new Date().getDay();
  let defaultDay = 'Lunes';
  // Check days in reverse order to find the latest generated one
  for (let i = DAYS.length - 1; i >= 0; i--) {
    if (isDayGenerated(DAYS[i])) {
      defaultDay = DAYS[i];
      break;
    }
  }
  currentDay = defaultDay;

  renderAll();
  loadEstimatesForCurrentDay();
  fetchSobrasForCurrentDay();
})();
